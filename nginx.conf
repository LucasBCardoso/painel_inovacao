# nginx.conf — Painel TRL Delta
# Bloco server para o domínio inovacao.delta.local
# aponte o include desta conf para o seu nginx.conf principal
# ou copie dentro do bloco http {}

server {
    listen      80;
    server_name inovacao.delta.local;

    # Logs
    access_log  /var/log/nginx/painel_trl_access.log;
    error_log   /var/log/nginx/painel_trl_error.log;

    # Aumenta limite de corpo (para uploads de anexos)
    client_max_body_size 32m;

    location / {
        proxy_pass         http://127.0.0.1:8051;
        proxy_http_version 1.1;

        # Headers padrão
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket (Dash usa SSE / websocket para hot-reload em dev)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Timeouts
        proxy_read_timeout  120;
        proxy_send_timeout  120;
    }

    # Arquivos estáticos servidos diretamente pelo nginx (opcional, melhora performance)
    location /assets/ {
        alias X:/15\ -\ P&D/TODOS\ OS\ PROJETOS/0\ -\ PAINEL\ TRL/painel-trl-delta-python/assets/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
